<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Specifiable</title>
  <!--link rel="stylesheet" href="/assets/katex/katex.min.css">
  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <link rel="stylesheet" href="/assets/style.css"-->
  <style>
    /* roboto-300 - latin */
    @font-face {
      font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
      font-family: 'Roboto';
      font-style: normal;
      font-weight: 300;
      src: url('assets/fonts/roboto-v51-latin-300.woff2') format('woff2'); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
    }

    /* roboto-500 - latin */
    @font-face {
      font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
      font-family: 'Roboto';
      font-style: normal;
      font-weight: 500;
      src: url('assets/fonts/roboto-v51-latin-500.woff2') format('woff2'); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
    }

    :root {
      /*
      --main-font:  ‘Roboto’, sans-serif ;
      --font-size:  1rem ;
      --header-height:  3rem ;

      fontcolor, background-color, maxwidth, margin-left, margin-right, margin-top, margin-bottom, linkcolor
      */
      --max-width:  1050px ;
    }

    /* ---- Reset ---- */
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* ---- Layout ---- */
    html {
      font-family: ‘Roboto’, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.5;
      color:  #1a1a1a ;
      background-color:  #fdfdfd ;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      margin: 0 auto;
      max-width: var(--max-width);
      padding-left:  50px ;
      padding-right:  50px ;
      padding-top:  50px ;
      padding-bottom:  50px ;
      hyphens: auto;
      overflow-wrap: break-word;
      text-rendering: optimizeLegibility;
      font-kerning: normal;
    }

    header.topheader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3rem;
      background: white;
      opacity: .94;
      z-index: 100;
      border-bottom: 1px solid #e0e0e0;
    }

    header nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100%;
      max-width: var(--max-width);
      margin-inline: auto;
      padding-inline: 4rem;
      gap: 2rem;
    }

    header nav div {
      display: flex;
      gap: 2rem;
    }

    header nav a {
      text-decoration: none;
      color: inherit;
    }

    main {
      /*
      display: grid;
      grid-template-columns: 1fr 3fr;
      */
      margin-top: 3rem;       /* clear the fixed header */
      max-width: 1200px;
      width: 100%;
      margin-inline: auto;    /* center on wide screens */
    }

    /* ---- Table of contents ---- */
    aside {
      padding: 2rem 1rem 2rem 2rem;
    }

    #toc {
      position: sticky;
      top: 4rem;              /* header height + small gap */
      font-size: .75rem;
      font-weight: 500;
      line-height: 1.7;
      z-index: 1;
    }
    #toc li {
      list-style: none;
    }
    #toc ul {
      padding-left: 1.3em;
    }
    #toc > ul {
      padding-left: 0;
    }
    #toc a:not(:hover) {
      text-decoration: none;
    }
    #toc a:hover {
      text-decoration: none;
      color: #2698ba;
      transition: all 0.2s ease-in-out;
    }

    /* ---- Article ---- */
    article {
      padding: 2rem 2rem 2rem 1rem;
      min-width: 0;           /* prevents grid blowout with long content */
    }

    p {
      margin: 1em 0;
    }

    .intro p {
      text-align: center;
    }

    main.home {
      display: grid;
      grid-template-columns: 1fr 3fr 1fr;
    }

    .intro, .posts {
      grid-column: 2;
    }

    .posts {
      margin-top: 5rem;
      /*max-width: 66%;*/
    }

    /*
    .posts ul {
      max-width: 60ch;
    }
    */

    a {
      color: #1a1a1a;
    }

    a:visited {
      color: #1a1a1a;
    }

    h1, h2, h3, h4, h5, h6 {
      margin-top: 1.4em;
      text-align: center;
      font-weight: 300;
    }

    h1 {
      margin-top: 0;
      font-size: 4rem;
    }

    h2 {
      font-size: 2rem;
    }

    h3 {
      font-size: 1.75rem;
    }

    h5, h6 {
      font-size: 1em;
      font-style: italic;
    }

    h6 {
      font-weight: normal;
    }

    ol, ul {
      padding-left: 1.7em;
      margin-top: 1em;
    }

    li > ol, li > ul {
      margin-top: 0;
    }

    header {
      margin-bottom: 4em;
      text-align: center;
    }

    code {
      font-family:  Menlo, Monaco, Consolas, 'Lucida Console', monospace ;
      color: #2698ba;
      background-color: #2c3237;
      padding: .2em .4em;
      font-size: 85%;
      margin: 0;
      hyphens: manual;
      border-radius: 3px;
      word-wrap: break-word;
    }

    pre {
      margin: 1em 0;
      background-color: #2c3237;
      padding: 0.5em;
      overflow: auto;
      border-radius: 5px;
    }

    pre code {
      padding: 0;
      overflow: visible;
      overflow-wrap: normal;
    }

    .sourceCode {
     background-color: transparent;
     overflow: visible;
    }

    .date {
      color: #828282;
      font-size: .875rem;
      text-align: left;
      /*margin-bottom: 0;*/
    }

    .abstract {
      text-align: left;
    }

    .abstract-title {
      text-align: center;
    }

    .filetree {
      line-height: 1;
    }
  </style>
</head>
<body>

  <header class="topheader">
    <nav>
      <a href="/">Specifiable</a>
      <div>
        <a href="/about.html">About</a>
      </div>
    </nav>
  </header>

  <main class="home">

    <section class="intro">
      <h1>Specifiable</h1>
      <p>On modeling, formal methods and correct-by-construction
software.</p>
    </section>

    <section class="posts">
      <ul>
                <li>
          <time datetime="2026-03-25">2026-03-25</time>
          <a href="posts/entity-protocol.html">REST’s semantics are
informal. Here is a formal alternative.</a>
                    <p>Starting from Docker, we develop a formal model
for distributed state.</p>
                  </li>
              </ul>
    </section>

  </main>

</body>
</html>

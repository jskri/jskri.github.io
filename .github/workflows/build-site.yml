name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/jskri/blog-builder@sha256:0ad8626045bdd0a08988b2640f061c73ea72813c3c78c0c494d18a62d457f10d # v1.0.2

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build site
        run: make all

      - name: Publish site
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
